name: Claude Code Review

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize]
  workflow_call:
    inputs:
      min_quality_score:
        description: "Minimum quality score (0-100) to pass the gate"
        type: number
        default: 70
      use_tools:
        description: "Use Pattern B agentic review with file reading"
        type: boolean
        default: false
      dry_run:
        description: "Return a mock response — no API key required, good for testing"
        type: boolean
        default: false
    secrets:
      ANTHROPIC_API_KEY:
        description: "Anthropic API key — not needed when dry_run is true"
        required: false

jobs:
  # ── Runs on every trigger — verifies the project builds ──────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build
        run: dotnet build scripts/ClaudeReview/ClaudeReview.csproj -c Release

  # ── Dry-run review — no API key needed ───────────────────────────────────
  # Runs on: pull_request always | workflow_call when dry_run=true
  claude-review-dry-run:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request' || inputs.dry_run == true
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Generate diff
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff origin/${{ github.base_ref }}...HEAD > diff.txt
          else
            # workflow_call dry-run: diff content doesn't matter, response is mocked
            echo "--- a/example.cs
+++ b/example.cs
@@ -1,3 +1,4 @@
+// dry-run test change
 public class Example { }" > diff.txt
          fi

      - name: Build
        run: dotnet build scripts/ClaudeReview/ClaudeReview.csproj -c Release

      - name: Run Claude review (dry run)
        env:
          DRY_RUN:   "true"
          GH_TOKEN:  ${{ secrets.GITHUB_TOKEN }}
          REPO:      ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          DIFF_PATH: "diff.txt"
        run: dotnet run --project scripts/ClaudeReview/ClaudeReview.csproj -c Release --no-build

  # ── Real Claude review — requires ANTHROPIC_API_KEY ──────────────────────
  # Runs on: pull_request always | workflow_call when dry_run=false
  claude-review:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_call' && inputs.dry_run != true)
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Generate diff
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff origin/${{ github.base_ref }}...HEAD > diff.txt
          else
            git diff HEAD~1 HEAD > diff.txt
          fi

      - name: Build
        run: dotnet build scripts/ClaudeReview/ClaudeReview.csproj -c Release

      - name: Run Claude review (Pattern A)
        if: inputs.use_tools != true && env.USE_TOOLS != 'true' && env.ANTHROPIC_API_KEY != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN:          ${{ secrets.GITHUB_TOKEN }}
          REPO:              ${{ github.repository }}
          PR_NUMBER:         ${{ github.event.pull_request.number }}
          MIN_QUALITY_SCORE: ${{ inputs.min_quality_score || 70 }}
          DIFF_PATH:         "diff.txt"
        run: dotnet run --project scripts/ClaudeReview/ClaudeReview.csproj -c Release --no-build

      - name: Run Claude review (Pattern B — tool use)
        if: (inputs.use_tools == true || env.USE_TOOLS == 'true') && env.ANTHROPIC_API_KEY != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN:          ${{ secrets.GITHUB_TOKEN }}
          REPO:              ${{ github.repository }}
          PR_NUMBER:         ${{ github.event.pull_request.number }}
          MIN_QUALITY_SCORE: ${{ inputs.min_quality_score || 70 }}
          DIFF_PATH:         "diff.txt"
          USE_TOOLS:         "true"
        run: dotnet run --project scripts/ClaudeReview/ClaudeReview.csproj -c Release --no-build

      - name: Skip notice (no API key configured)
        if: env.ANTHROPIC_API_KEY == ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: echo "ANTHROPIC_API_KEY not set — skipping real Claude review. Add it in repo Settings > Secrets > Actions."
