name: Claude Code Review

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize]
  workflow_call:
    inputs:
      min_quality_score:
        description: "Minimum quality score (0-100) to pass the gate"
        type: number
        default: 70
      use_tools:
        description: "Use Pattern B agentic review with file reading"
        type: boolean
        default: false
      dry_run:
        description: "Return a mock response — no API key required, good for testing"
        type: boolean
        default: false
    secrets:
      ANTHROPIC_API_KEY:
        description: "Anthropic API key — not needed when dry_run is true"
        required: false

env:
  IMAGE: ghcr.io/nur-azad/claude-review:latest

jobs:
  # ── Dry-run review — no API key needed ───────────────────────────────────
  claude-review-dry-run:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || inputs.dry_run == true
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate diff
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff origin/${{ github.base_ref }}...HEAD > diff.txt
          else
            echo "dry-run placeholder" > diff.txt
          fi

      - name: Run Claude review (dry run)
        run: |
          docker run --rm \
            -e DRY_RUN=true \
            -e GH_TOKEN=${{ secrets.GITHUB_TOKEN }} \
            -e REPO=${{ github.repository }} \
            -e PR_NUMBER=${{ github.event.pull_request.number }} \
            -e DIFF_PATH=/diff.txt \
            -v ${{ github.workspace }}/diff.txt:/diff.txt:ro \
            ${{ env.IMAGE }}

  # ── Real Claude review — requires ANTHROPIC_API_KEY ──────────────────────
  claude-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_call' && inputs.dry_run != true)
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate diff
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff origin/${{ github.base_ref }}...HEAD > diff.txt
          else
            git diff HEAD~1 HEAD > diff.txt
          fi

      - name: Run Claude review (Pattern A)
        if: inputs.use_tools != true && env.USE_TOOLS != 'true' && env.ANTHROPIC_API_KEY != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          docker run --rm \
            -e ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }} \
            -e GH_TOKEN=${{ secrets.GITHUB_TOKEN }} \
            -e REPO=${{ github.repository }} \
            -e PR_NUMBER=${{ github.event.pull_request.number }} \
            -e MIN_QUALITY_SCORE=${{ inputs.min_quality_score || 70 }} \
            -e DIFF_PATH=/diff.txt \
            -v ${{ github.workspace }}/diff.txt:/diff.txt:ro \
            ${{ env.IMAGE }}

      - name: Run Claude review (Pattern B — tool use)
        if: (inputs.use_tools == true || env.USE_TOOLS == 'true') && env.ANTHROPIC_API_KEY != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          docker run --rm \
            -e ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }} \
            -e GH_TOKEN=${{ secrets.GITHUB_TOKEN }} \
            -e REPO=${{ github.repository }} \
            -e PR_NUMBER=${{ github.event.pull_request.number }} \
            -e MIN_QUALITY_SCORE=${{ inputs.min_quality_score || 70 }} \
            -e USE_TOOLS=true \
            -e DIFF_PATH=/diff.txt \
            -v ${{ github.workspace }}/diff.txt:/diff.txt:ro \
            ${{ env.IMAGE }}

      - name: Skip notice (no API key configured)
        if: env.ANTHROPIC_API_KEY == ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: echo "ANTHROPIC_API_KEY not set — skipping real Claude review. Add it in repo Settings > Secrets > Actions."
