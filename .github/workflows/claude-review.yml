name: Claude Code Review

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize]
  workflow_call:
    inputs:
      min_quality_score:
        description: "Minimum quality score (0-100) to pass the gate"
        type: number
        default: 70
      use_tools:
        description: "Use Pattern B agentic review with file reading"
        type: boolean
        default: false
    secrets:
      ANTHROPIC_API_KEY:
        description: "Anthropic API key — omit to run in dry-run mode"
        required: false

jobs:
  # ── Runs on every push AND every PR — just verifies the project builds ────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build
        run: dotnet build scripts/ClaudeReview/ClaudeReview.csproj -c Release

  # ── Dry-run review — only on PRs, no API key needed ──────────────────────
  claude-review-dry-run:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Generate diff
        run: git diff origin/${{ github.base_ref }}...HEAD > diff.txt

      - name: Build
        run: dotnet build scripts/ClaudeReview/ClaudeReview.csproj -c Release

      - name: Run Claude review (dry run)
        env:
          DRY_RUN:   "true"
          GH_TOKEN:  ${{ secrets.GITHUB_TOKEN }}
          REPO:      ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          DIFF_PATH: "diff.txt"
        run: dotnet run --project scripts/ClaudeReview/ClaudeReview.csproj -c Release --no-build

  # ── Real Claude review — only on PRs, requires ANTHROPIC_API_KEY secret ──
  claude-review:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Generate diff
        run: git diff origin/${{ github.base_ref }}...HEAD > diff.txt

      - name: Build
        run: dotnet build scripts/ClaudeReview/ClaudeReview.csproj -c Release

      - name: Run Claude review (Pattern A)
        if: inputs.use_tools != true && env.USE_TOOLS != 'true' && env.ANTHROPIC_API_KEY != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN:          ${{ secrets.GITHUB_TOKEN }}
          REPO:              ${{ github.repository }}
          PR_NUMBER:         ${{ github.event.pull_request.number }}
          MIN_QUALITY_SCORE: ${{ inputs.min_quality_score || 70 }}
          DIFF_PATH:         "diff.txt"
        run: dotnet run --project scripts/ClaudeReview/ClaudeReview.csproj -c Release --no-build

      - name: Run Claude review (Pattern B — tool use)
        if: (inputs.use_tools == true || env.USE_TOOLS == 'true') && env.ANTHROPIC_API_KEY != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN:          ${{ secrets.GITHUB_TOKEN }}
          REPO:              ${{ github.repository }}
          PR_NUMBER:         ${{ github.event.pull_request.number }}
          MIN_QUALITY_SCORE: ${{ inputs.min_quality_score || 70 }}
          DIFF_PATH:         "diff.txt"
          USE_TOOLS:         "true"
        run: dotnet run --project scripts/ClaudeReview/ClaudeReview.csproj -c Release --no-build

      - name: Skip notice (no API key configured)
        if: env.ANTHROPIC_API_KEY == ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: echo "ANTHROPIC_API_KEY not set — skipping real Claude review. Add it in repo Settings > Secrets > Actions."
